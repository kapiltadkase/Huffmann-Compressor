<!DOCTYPE html>
<html lang="en">
<head>
    <title>Huffman Compressor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Huffman Compressor</h1>
        <p>Lossless file compression using Huffman Coding</p>

        <input type="file" id="fileInput">

        <div class="buttons">
            <button type="button" id="compressBtn" class="compress-btn">Compress</button>
            <button type="button" id="decompressBtn" class="decompress-btn">Decompress</button>
        </div>

        <div id="actions" style="display:none;">
            <button type="button" id="downloadBtn">Download</button>
            <button type="button" id="resetBtn">Reset</button>
        </div>

        <div id="status"></div>

        <div id="stats" class="stats-card" style="display:none;">
            <h3>Compression Results</h3>
            <p id="originalSize"></p>
            <p id="compressedSize"></p>
            <p id="spaceSaved"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
