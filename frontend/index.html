<!DOCTYPE html>
<html lang="en">
<head>
    <title>Huffman Compressor</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>Huffman Compressor</h1>
        <p>Lossless file compression using Huffman Coding </p>

        <input type="file" id="fileInput">

        <div class="buttons">
            <button class="compress-btn" onClick="compress()">Compress</button>
            <button class="decompress-btn" onClick="decompress()">Decompress</button>
        </div>

        <p id="status"></p>
    </div>

    <script src="script.js"></script>
    
    
</body>
</html>
